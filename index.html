<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#b91c1c">
  <title>労組結成ナビ｜労働組合づくりアプリ</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- アプリヘッダー -->
  <header class="app-header">
    <div class="app-header-inner">
      <div class="brand">
        <span class="brand-mark">✊</span>
        <div class="brand-text">
          <strong id="unionNameDisplay">労組結成ナビ</strong>
          <small>労働組合づくりアプリ</small>
        </div>
      </div>
      <button class="icon-btn" id="settingsBtn" title="設定" aria-label="設定">⚙️</button>
    </div>
  </header>

  <!-- メインコンテンツ（各画面） -->
  <main id="view" class="view"></main>

  <!-- ボトムナビゲーション -->
  <nav class="tabbar" id="tabbar">
    <button class="tab" data-route="home"><span class="tab-ico">🏠</span><span>ホーム</span></button>
    <button class="tab" data-route="members"><span class="tab-ico">👥</span><span>名簿</span></button>
    <button class="tab" data-route="card"><span class="tab-ico">✍️</span><span>加入</span></button>
    <button class="tab" data-route="notices"><span class="tab-ico">📢</span><span>お知らせ</span></button>
    <button class="tab" data-route="polls"><span class="tab-ico">🗳️</span><span>投票</span></button>
  </nav>

  <!-- モーダル -->
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>

  <!-- トースト -->
  <div class="toast" id="toast" hidden></div>

  <!-- クラウド同期（任意）。config.js が未設定ならローカル単体で動作 -->
  <!-- defer で順序を保ちつつ非ブロッキング読込（CDN不通でも本体は動作） -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="config.js"></script>
  <script defer src="cloud.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
